services:
    api:
        build:
            context: .
            dockerfile: SistemaControleGastosResidenciais/Dockerfile
        ports:
            - "7201:8080"
        environment:
            - ConnectionStrings__MSSQLServerConnectionString=Server=sqlserver,1433;Database=db_household_expense_tracking_development;User Id=sa;Password=Database123@;TrustServerCertificate=True;
        depends_on:
            - sqlserver

    sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        environment:
            ACCEPT_EULA: "Y"
            MSSQL_SA_PASSWORD: "Database123@"
        ports:
            - "1433:1433"
        volumes:
            - sqlserver-data:/var/opt/mssql

volumes:
    sqlserver-data: